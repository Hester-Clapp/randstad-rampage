<script>
  var overlay = document.getElementById('rotterdam-overlay');

  function updateTransform() {
    var tx = +document.getElementById('tx').value;
    var ty = +document.getElementById('ty').value;
    var sx = +document.getElementById('sx').value;
    var sy = +document.getElementById('sy').value;
    document.getElementById('tx-val').textContent = tx;
    document.getElementById('ty-val').textContent = ty;
    document.getElementById('sx-val').textContent = sx.toFixed(2);
    document.getElementById('sy-val').textContent = sy.toFixed(2);
    document.getElementById('tx-num').value = tx;
    document.getElementById('ty-num').value = ty;
    document.getElementById('sx-num').value = sx.toFixed(2);
    document.getElementById('sy-num').value = sy.toFixed(2);
    overlay.style.transform =
      'translateX(' + tx + 'px) translateY(' + ty + 'px) scaleX(' + sx + ') scaleY(' + sy + ')';
  }

  function resetTransform() {
    ['tx','ty'].forEach(function(id) { document.getElementById(id).value = 0; });
    ['sx','sy'].forEach(function(id) { document.getElementById(id).value = 1; });
    updateTransform();
  }

  // Sync sliders -> number inputs
  ['tx','ty','sx','sy'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', updateTransform);
  });

  // Sync number inputs -> sliders
  ['tx','ty','sx','sy'].forEach(function(id) {
    document.getElementById(id + '-num').addEventListener('input', function() {
      document.getElementById(id).value = this.value;
      updateTransform();
    });
  });

  document.getElementById('show-overlay').addEventListener('change', function() {
    overlay.style.display = this.checked ? '' : 'none';
  });

  document.getElementById('opacity').addEventListener('input', function() {
    document.getElementById('op-val').textContent = parseFloat(this.value).toFixed(2);
    overlay.style.opacity = this.value;
  });
</script>
